---
# CPU-based autoscaling for workers (PRD §10.3). Required — workers must
# declare resource requests for utilization % to be computable.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: report-composer-worker-hpa
  namespace: report-composer
  labels:
    app.kubernetes.io/name: report-composer
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: report-composer-worker
  minReplicas: 2
  # Local single-machine default (PRD §9 local column). The production-scale
  # intent is maxReplicas: 20 (PRD §10.3) — raise it on a real cluster; on a
  # laptop VM 20 JVM workers oversubscribe memory and thrash the node.
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
