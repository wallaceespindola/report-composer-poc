---
# CPU-based autoscaling for workers (PRD §10.3). Required — workers must
# declare resource requests for utilization % to be computable.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: report-composer-worker-hpa
  namespace: report-composer
  labels:
    app.kubernetes.io/name: report-composer
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: report-composer-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
