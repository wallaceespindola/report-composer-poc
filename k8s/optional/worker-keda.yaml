---
# OPTIONAL: KEDA ScaledObject scaling workers on Kafka consumer-group lag
# (PRD §10.3). Alternative/complement to the CPU-based HPA in 22-worker-hpa.yaml.
# Lives under k8s/optional/ so `kubectl apply -f k8s/` skips it — it fails
# without the KEDA operator (https://keda.sh) installed. Apply explicitly:
#   kubectl apply -f k8s/optional/worker-keda.yaml
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: report-composer-worker-scaledobject
  namespace: report-composer
  labels:
    app.kubernetes.io/name: report-composer
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    name: report-composer-worker
  minReplicaCount: 2
  maxReplicaCount: 20
  cooldownPeriod: 60
  pollingInterval: 15
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: report-workers
        topic: report.partitions
        lagThreshold: "5"
        allowIdleConsumers: "false"
