---
# Single-node Kafka in KRaft mode (no ZooKeeper). POC-scale only — one broker
# combining the broker and controller roles (PRD §2, §9).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: report-composer
  labels:
    app.kubernetes.io/name: report-composer
    app.kubernetes.io/component: kafka
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        app.kubernetes.io/name: report-composer
        app.kubernetes.io/component: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 9093
              name: controller
          env:
            # Combined broker+controller single-node KRaft config. All clients
            # (api/master/worker pods) resolve the broker via the Service DNS
            # name "kafka", so the same listener is used for advertised traffic.
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_LOG_DIRS
              value: "/tmp/kraft-combined-logs"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false" # topics are provisioned by the app on startup, see PRD §9
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk" # fixed, arbitrary base64 cluster id — POC only
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: report-composer
  labels:
    app.kubernetes.io/name: report-composer
    app.kubernetes.io/component: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
