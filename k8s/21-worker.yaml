---
# Long-lived worker pool consuming the Kafka request topic (PRD §10). Resource
# requests/limits are required here so the HPA can compute CPU utilization.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-composer-worker
  namespace: report-composer
  labels:
    app.kubernetes.io/name: report-composer
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: report-composer-worker
  template:
    metadata:
      labels:
        app: report-composer-worker
        app.kubernetes.io/name: report-composer
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 60 # allow the in-flight partition to finish and commit offset
      containers:
        - name: worker
          image: report-composer:latest
          imagePullPolicy: Never # built locally and loaded into minikube/kind
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_ROLE
              value: "worker"
          envFrom:
            - configMapRef:
                name: report-composer-config
            - secretRef:
                name: report-composer-secret
          # startupProbe gates the liveness probe until the JVM finishes booting —
          # on constrained local clusters startup can take minutes
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "640Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: report-composer-worker
  namespace: report-composer
  labels:
    app.kubernetes.io/name: report-composer
    app.kubernetes.io/component: worker
spec:
  selector:
    app: report-composer-worker
  ports:
    - name: http
      port: 8080
      targetPort: 8080
