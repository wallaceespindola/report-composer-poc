# Report Composer POC — full stack on one machine (PRD §11.1).
# Start: docker compose up -d --build --scale worker=3
name: report-composer

services:
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # topics are provisioned by the app (KafkaAdmin) with a deterministic partition count
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # Shared DB for master + workers (Spring Batch metadata must be shared).
  # H2 TCP server in Oracle compatibility mode; host port 9093 avoids Kafka's 9092.
  h2:
    image: oscarfonts/h2:latest
    # image is amd64-only; pin the platform so arm64 hosts (Apple Silicon) run it
    # under emulation without the mismatch warning — H2 is tiny, emulation is fine
    platform: linux/amd64
    ports:
      - "9093:1521"
      - "8083:81" # H2 web console
    environment:
      H2_OPTIONS: -ifNotExists
    volumes:
      - h2-data:/opt/h2-data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin} &&
      mc mb -p local/${MINIO_BUCKET:-reports} &&
      echo 'bucket ready'"

  # REST API + in-process master (LAUNCHER_MODE=local): the manager step runs here
  # while workers run as separate containers — master and workers on one machine.
  api:
    build: .
    image: report-composer:latest
    ports:
      - "8080:8080"
    environment: &app-env
      APP_ROLE: api
      SPRING_PROFILES_ACTIVE: compose
      LAUNCHER_MODE: local
      DB_URL: jdbc:h2:tcp://h2:1521//opt/h2-data/report;MODE=Oracle
      DB_USER: sa
      DB_PASSWORD: ""
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_REQUEST_TOPIC: report.partitions
      KAFKA_REPLY_TOPIC: report.replies
      KAFKA_REQUEST_PARTITIONS: 10
      KAFKA_CONCURRENCY: 2
      SEED_ENABLED: "true"
      SEED_ACCOUNTS_PER_TENANT: ${SEED_ACCOUNTS_PER_TENANT:-50}
      SEED_BUSINESS_DATE: ${SEED_BUSINESS_DATE:-2026-06-30}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-reports}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      h2:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s
    restart: on-failure

  # Batch workers — scale with: docker compose up -d --scale worker=N
  worker:
    image: report-composer:latest
    build: .
    environment:
      <<: *app-env
      APP_ROLE: worker
    depends_on:
      api:
        condition: service_healthy # schema migrated + data seeded before workers join
    restart: on-failure

  frontend:
    image: nginx:alpine
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  h2-data:
  minio-data:
